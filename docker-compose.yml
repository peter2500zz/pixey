services:
  pixey:
    build: .

    # 共享宿主机网络栈（Linux 推荐）：
    #   - 代理端口 7070 / 管理界面 7071 直接绑定到宿主机
    #   - config.yaml 中上游代理 URL 直接填 localhost:<port> 即可
    # macOS / Windows Docker Desktop 不支持 host 模式，需改用下方的 bridge 配置。
    network_mode: "host"

    # ── bridge 模式备用（macOS / Windows 或需要端口隔离时取消注释，并注释掉上方 network_mode）──
    # ports:
    #   - "7070:7070"
    #   - "7071:7071"
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"   # Linux 访问宿主机服务时需要

    volumes:
      # 持久化 TOTP 密钥和凭证数据 — 必须挂载，否则重启后丢失
      - pixey-data:/app/data
      # 挂载配置文件（只读），修改后重启容器生效
      - ./config.yaml:/app/config.yaml:ro

    restart: unless-stopped

    environment:
      - TZ=Asia/Shanghai

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7071/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  pixey-data:
    driver: local
