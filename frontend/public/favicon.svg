<!-- Pixey fairy mascot — pixel-art SVG favicon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Left wing -->
  <rect x="0" y="3" width="1" height="1" fill="#bfdbfe" opacity=".7"/>
  <rect x="0" y="4" width="2" height="2" fill="#93c5fd" opacity=".8"/>
  <rect x="1" y="3" width="2" height="3" fill="#93c5fd" opacity=".75"/>
  <rect x="0" y="5" width="1" height="1" fill="#dbeafe" opacity=".5"/>
  <!-- Right wing -->
  <rect x="15" y="3" width="1" height="1" fill="#bfdbfe" opacity=".7"/>
  <rect x="14" y="4" width="2" height="2" fill="#93c5fd" opacity=".8"/>
  <rect x="13" y="3" width="2" height="3" fill="#93c5fd" opacity=".75"/>
  <rect x="15" y="5" width="1" height="1" fill="#dbeafe" opacity=".5"/>
  <!-- Antennae sparkle -->
  <rect x="6" y="0" width="1" height="1" fill="#60a5fa"/>
  <rect x="9" y="0" width="1" height="1" fill="#93c5fd"/>
  <!-- Hair -->
  <rect x="5" y="1" width="6" height="1" fill="#1e3a8a"/>
  <rect x="4" y="2" width="8" height="1" fill="#1e3a8a"/>
  <!-- Face -->
  <rect x="4" y="3" width="8" height="3" fill="#fde68a"/>
  <!-- Eyes -->
  <rect x="5" y="4" width="1" height="1" fill="#1e3a8a"/>
  <rect x="10" y="4" width="1" height="1" fill="#1e3a8a"/>
  <!-- Body / dress -->
  <rect x="4" y="6" width="8" height="1" fill="#60a5fa"/>
  <rect x="3" y="7" width="10" height="3" fill="#3b82f6"/>
  <rect x="4" y="7" width="8" height="1" fill="#60a5fa" opacity=".4"/>
  <rect x="4" y="10" width="8" height="1" fill="#2563eb"/>
  <!-- Legs -->
  <rect x="5" y="11" width="2" height="2" fill="#1d4ed8"/>
  <rect x="9" y="11" width="2" height="2" fill="#1d4ed8"/>
  <!-- Shoes -->
  <rect x="4" y="13" width="3" height="1" fill="#1e40af"/>
  <rect x="9" y="13" width="3" height="1" fill="#1e40af"/>
  <!-- Wand tip -->
  <rect x="13" y="2" width="1" height="1" fill="#fbbf24"/>
  <rect x="14" y="1" width="1" height="1" fill="#fef3c7"/>
</svg>